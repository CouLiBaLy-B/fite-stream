# =============================================================
# FitStream Docker Compose v2
# Frontend Next.js + Backend FastAPI
# Run with: docker compose up --build
# =============================================================

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: fitstream-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./uploads:/app/uploads
      - ./jobs:/app/jobs
    environment:
      - FITSTREAM_DEVICE=cuda
      - FITSTREAM_OUTPUT_DIR=/app/outputs
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - fitstream

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fitstream-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - fitstream

networks:
  fitstream:
    driver: bridge