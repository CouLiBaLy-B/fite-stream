# FitStream Release — Build & Publish on version tags
name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    name: Full Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: |
          pip install pyyaml loguru click rich pydantic pytest hypothesis
          pip install fastapi uvicorn python-multipart httpx
          pip install pillow numpy scipy opencv-python-headless imageio
          pip install ruff black mypy types-Pillow types-PyYAML types-requests
      - run: ruff check fitstream/ tests/
      - run: PYTHONPATH=. python -m mypy fitstream/ --no-error-summary
      - env: {PYTHONPATH: .}
        run: python -m pytest tests/ -v --tb=short --junitxml=junit-results.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: test-results, path: junit-results.xml}

  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=semver,pattern={{version}}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: base

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          name: FitStream ${{ github.ref_name }}
          generate_release_notes: true
