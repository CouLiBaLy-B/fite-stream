# ============================================================
# FitStream Release — Tag-based release with Docker push
# Triggers on version tags (v0.1.0, v0.2.0, etc.)
# ============================================================

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Run full test suite
  # ──────────────────────────────────────────────────
  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          pip install pyyaml loguru click rich pydantic pytest
          pip install fastapi uvicorn python-multipart httpx
          pip install pillow numpy scipy opencv-python-headless imageio
      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -v

  # ──────────────────────────────────────────────────
  # Job 2: Build and push Docker image
  # ──────────────────────────────────────────────────
  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────
  # Job 3: Create GitHub Release
  # ──────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [test, docker-release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          # Get commits since last tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --oneline --no-merges | head -20)
          else
            NOTES=$(git log ${PREV_TAG}..HEAD --oneline --no-merges)
          fi
          echo "NOTES<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## 🎬 FitStream ${{ github.ref_name }}

            ### Docker
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ### Install from source
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd fitstream
            git checkout ${{ github.ref_name }}
            bash scripts/setup.sh
            ```

            ### Changes
            ${{ steps.notes.outputs.NOTES }}
