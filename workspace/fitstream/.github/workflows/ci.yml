# ============================================================
# FitStream CI — Lint, Test, Build
# Runs on every push and pull request
# ============================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────
  # Job 1: Lint & Type Check
  # ──────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff black

      - name: Ruff lint
        run: ruff check fitstream/ tests/ --output-format=github

      - name: Black format check
        run: black --check --diff fitstream/ tests/

  # ──────────────────────────────────────────────────
  # Job 2: Unit & Integration Tests
  # ──────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyyaml loguru click rich pydantic pytest
          pip install fastapi uvicorn python-multipart httpx
          pip install pillow numpy scipy opencv-python-headless imageio

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest tests/ -v --tb=short --junitxml=junit-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: junit-results.xml

  # ──────────────────────────────────────────────────
  # Job 3: Demo (end-to-end without GPU)
  # ──────────────────────────────────────────────────
  demo:
    name: End-to-End Demo
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyyaml loguru click rich pydantic
          pip install pillow numpy scipy opencv-python-headless

      - name: Run E2E demo
        env:
          PYTHONPATH: .
        run: python scripts/demo.py

  # ──────────────────────────────────────────────────
  # Job 4: Docker Build
  # ──────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: fitstream:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Only build the base stage (no CUDA needed for CI)
          target: base
