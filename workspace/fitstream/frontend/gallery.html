<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitStream — Gallery</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07070e;--glass:rgba(255,255,255,.04);--glass2:rgba(255,255,255,.07);
  --glass-border:rgba(255,255,255,.08);--glass-hover:rgba(255,255,255,.12);
  --pr:#8b5cf6;--pr2:#a78bfa;--pr-glow:rgba(139,92,246,.25);
  --ac:#06d6a0;--pink:#ec4899;--blue:#3b82f6;--red:#ef4444;
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;
  --r:12px;--r2:16px;--blur:blur(20px);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(7,7,14,.85);backdrop-filter:var(--blur);border-bottom:1px solid var(--glass-border)}
.nav-logo{font-size:20px;font-weight:800}.nav-logo span{background:linear-gradient(135deg,var(--pr),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:4px}
.nav-links a{color:var(--tx2);text-decoration:none;font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;transition:all .2s}
.nav-links a:hover,.nav-links a.active{color:var(--tx);background:var(--glass2)}

/* BG */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15}
.orb-1{width:500px;height:500px;background:var(--pr);top:-100px;right:-100px}

/* CONTENT */
.content{position:relative;z-index:1;padding:80px 24px 40px;max-width:1400px;margin:0 auto}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.page-header h1{font-size:28px;font-weight:800}

/* FILTERS */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{
  padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  background:var(--glass);border:1px solid var(--glass-border);color:var(--tx2);transition:all .2s;
}
.filter-btn:hover{background:var(--glass-hover)}
.filter-btn.active{background:rgba(139,92,246,.15);border-color:var(--pr);color:var(--pr2)}

/* STATS */
.gallery-stats{display:flex;gap:24px;margin-bottom:24px;flex-wrap:wrap}
.g-stat{font-size:13px;color:var(--tx3)}.g-stat strong{color:var(--tx);font-weight:700}

/* GRID */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.card{
  background:var(--glass);border:1px solid var(--glass-border);border-radius:var(--r2);
  overflow:hidden;transition:all .3s;cursor:pointer;
}
.card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.15);box-shadow:0 12px 40px rgba(0,0,0,.4)}
.card video,.card .thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:#111}
.card-body{padding:14px}
.card-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--pr2);margin-bottom:4px}
.card-prompt{font-size:13px;color:var(--tx2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:var(--tx3)}
.card-actions{display:flex;gap:6px}
.card-btn{padding:4px 8px;border-radius:6px;background:var(--glass2);border:none;color:var(--tx3);cursor:pointer;font-size:11px;transition:all .15s}
.card-btn:hover{background:var(--glass-hover);color:var(--tx)}

/* EMPTY */
.empty{text-align:center;padding:80px 40px;color:var(--tx3)}
.empty .e-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty a{color:var(--pr2);text-decoration:none}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.show{display:flex}
.modal{background:var(--bg);border:1px solid var(--glass-border);border-radius:var(--r2);max-width:900px;width:100%;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.modal-close{position:absolute;top:16px;right:16px;background:var(--glass);border:1px solid var(--glass-border);color:var(--tx);width:36px;height:36px;border-radius:10px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal video{width:100%;display:block}
.modal-info{padding:20px}
.modal-info h3{font-size:16px;margin-bottom:8px}
.modal-info .detail{font-size:13px;color:var(--tx2);margin-bottom:4px}
.modal-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.m-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:var(--glass);border:1px solid var(--glass-border);color:var(--tx2);transition:all .2s;text-decoration:none}
.m-btn:hover{background:var(--glass-hover);color:var(--tx)}
.m-btn.primary{background:linear-gradient(135deg,var(--pr),#7c3aed);color:#fff;border:none}

@media(max-width:640px){.nav-links{display:none}.gallery-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="bg-orbs"><div class="orb orb-1"></div></div>

<nav>
  <div class="nav-logo">🎬 <span>FitStream</span></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="create.html">Create</a>
    <a href="gallery.html" class="active">Gallery</a>
    <a href="monitor.html">Monitor</a>
  </div>
</nav>

<div class="content">
  <div class="page-header">
    <h1>🖼️ Gallery</h1>
    <button class="filter-btn" onclick="loadGallery()" style="background:var(--glass-hover)">🔄 Refresh</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all" onclick="filterBy('all',this)">All</button>
    <button class="filter-btn" data-filter="animate" onclick="filterBy('animate',this)">📸 Animate</button>
    <button class="filter-btn" data-filter="story" onclick="filterBy('story',this)">📖 Story</button>
    <button class="filter-btn" data-filter="tryon" onclick="filterBy('tryon',this)">👗 Try-On</button>
    <button class="filter-btn" data-filter="style" onclick="filterBy('style',this)">🎭 Style</button>
    <button class="filter-btn" data-filter="compose" onclick="filterBy('compose',this)">🎨 Compose</button>
  </div>

  <!-- Stats -->
  <div class="gallery-stats" id="galleryStats"></div>

  <!-- Grid -->
  <div class="gallery-grid" id="galleryGrid">
    <div class="empty"><div class="e-icon">🖼️</div><p>Loading gallery...</p></div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" style="position:relative">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <video id="modalVideo" controls loop autoplay></video>
    <div class="modal-info" id="modalInfo"></div>
  </div>
</div>

<script>
const API=window.location.origin;
let allJobs=[];
let currentFilter='all';

async function loadGallery(){
  try{
    const r=await fetch(`${API}/api/v1/jobs`);
    const d=await r.json();
    allJobs=(d.jobs||[]).filter(j=>j.status==='completed');
    renderGallery();
  }catch(e){
    document.getElementById('galleryGrid').innerHTML='<div class="empty"><div class="e-icon">⚠️</div><p>Could not load gallery. <a href="create.html">Create something first!</a></p></div>';
  }
}

function renderGallery(){
  let items=allJobs;
  if(currentFilter!=='all')items=items.filter(j=>(j.type||'animate')===currentFilter);

  const stats=document.getElementById('galleryStats');
  stats.innerHTML=`<div class="g-stat"><strong>${allJobs.length}</strong> videos</div>`;

  const grid=document.getElementById('galleryGrid');
  if(!items.length){
    grid.innerHTML='<div class="empty"><div class="e-icon">🎬</div><p>No videos yet. <a href="create.html">Create your first animation!</a></p></div>';
    return;
  }

  grid.innerHTML=items.map(j=>{
    const type=j.type||'animate';
    const icons={animate:'📸',story:'📖',tryon:'👗',style:'🎭',compose:'🎨',ab_styles:'🔬'};
    const prompt=j.prompt||j.story||'';
    return`<div class="card" onclick="openModal('${j.job_id}')">
      <video src="${API}/api/v1/jobs/${j.job_id}/video" muted loop onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"></video>
      <div class="card-body">
        <div class="card-type">${icons[type]||'🎬'} ${type}</div>
        <div class="card-prompt">${prompt.substring(0,100)}</div>
        <div class="card-meta">
          <span>${j.created_at?new Date(j.created_at).toLocaleDateString():''}</span>
          <div class="card-actions">
            <a class="card-btn" href="${API}/api/v1/jobs/${j.job_id}/video" download onclick="event.stopPropagation()">⬇️</a>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterBy(filter,btn){
  currentFilter=filter;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function openModal(jobId){
  const j=allJobs.find(x=>x.job_id===jobId);if(!j)return;
  document.getElementById('modalVideo').src=`${API}/api/v1/jobs/${jobId}/video`;
  document.getElementById('modalInfo').innerHTML=`
    <h3>${(j.type||'animate').toUpperCase()} — ${jobId}</h3>
    <div class="detail">📝 ${(j.prompt||j.story||'').substring(0,200)}</div>
    ${j.generation_time?`<div class="detail">⏱️ Generated in ${j.generation_time.toFixed(1)}s</div>`:''}
    ${j.created_at?`<div class="detail">📅 ${new Date(j.created_at).toLocaleString()}</div>`:''}
    <div class="modal-actions">
      <a class="m-btn primary" href="${API}/api/v1/jobs/${jobId}/video" download>⬇️ Download MP4</a>
      <button class="m-btn" onclick="doExport('${jobId}','gif')">🎞️ GIF</button>
      <button class="m-btn" onclick="doExport('${jobId}','webm')">🌐 WebM</button>
      <button class="m-btn" onclick="doExport('${jobId}','storyboard')">📋 Storyboard</button>
      <button class="m-btn" onclick="doExport('${jobId}','9:16')">📱 Vertical</button>
    </div>`;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}

async function doExport(jobId,fmt){
  try{
    const fd=new FormData();fd.append('format',fmt);
    const r=await fetch(`${API}/api/v1/export/${jobId}`,{method:'POST',body:fd});
    if(!r.ok){alert('Export failed');return}
    const blob=await r.blob();const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`fitstream_${jobId}.${fmt==='storyboard'?'jpg':fmt.includes(':')?'mp4':fmt}`;
    a.click();URL.revokeObjectURL(url);
  }catch(e){alert('Export error: '+e.message)}
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
loadGallery();
</script>
</body>
</html>
