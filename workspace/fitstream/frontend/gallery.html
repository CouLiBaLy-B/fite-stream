<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gallery — FitStream</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050510;--glass:rgba(255,255,255,.03);--glass2:rgba(255,255,255,.06);--glass3:rgba(255,255,255,.10);
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --text:#f0f0f8;--text2:#8890ae;--text3:#555a78;
  --purple:#8b5cf6;--purple2:#a78bfa;--purple-glow:rgba(139,92,246,.28);
  --emerald:#06d6a0;--pink:#ec4899;--blue:#3b82f6;--amber:#f59e0b;--red:#ef4444;
  --radius:14px;--radius-lg:20px;--blur:blur(24px);--shadow:0 4px 32px rgba(0,0,0,.5);
  --transition:.28s cubic-bezier(.4,0,.2,1);
  --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse 60% 40% at 50% -10%,rgba(6,214,160,.05),transparent)}
.glass{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow)}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,5,16,.75);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:1px solid var(--border)}
.nav-brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;letter-spacing:-.5px;text-decoration:none;color:var(--text)}
.nav-brand .gradient{background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-tabs{display:flex;gap:4px}
.nav-tab{color:var(--text2);text-decoration:none;font-size:13px;font-weight:600;padding:8px 16px;border-radius:10px;transition:all var(--transition)}
.nav-tab:hover,.nav-tab.active{color:var(--text);background:var(--glass2)}
main{padding-top:72px}.container{max-width:1400px;margin:0 auto;padding:24px}
.page-header{padding:20px 0}.page-title{font-size:28px;font-weight:800}.page-sub{color:var(--text2);font-size:14px;margin-top:4px}
.toolbar{display:flex;gap:12px;margin-bottom:24px;align-items:center;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{padding:10px 16px 10px 40px;width:100%;font-size:13px;border-radius:var(--radius);background:var(--glass2);border:1px solid var(--border);color:var(--text);outline:none;font-family:var(--font)}
.search-box input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(139,92,246,.12)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.filter-chip{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--glass);color:var(--text2);transition:all var(--transition)}
.filter-chip:hover{color:var(--text);background:var(--glass2)}
.filter-chip.active{color:var(--purple2);background:rgba(139,92,246,.12);border-color:var(--purple)}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.gallery-card{overflow:hidden;transition:all var(--transition);cursor:pointer}
.gallery-card:hover{transform:translateY(-4px);box-shadow:0 8px 40px rgba(0,0,0,.6)}
.gallery-thumb{width:100%;aspect-ratio:16/9;background:var(--glass2);display:flex;align-items:center;justify-content:center;font-size:48px;color:var(--text3);position:relative;overflow:hidden}
.gallery-thumb .play-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);opacity:0;transition:opacity var(--transition);font-size:48px}
.gallery-thumb:hover .play-overlay{opacity:1}
.gallery-body{padding:16px}
.gallery-prompt{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gallery-info{font-size:11px;color:var(--text3);display:flex;gap:12px;margin-top:6px}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 10px;border-radius:8px;text-transform:uppercase;letter-spacing:.6px}
.badge-purple{background:rgba(139,92,246,.15);color:var(--purple2)}
.badge-emerald{background:rgba(6,214,160,.15);color:var(--emerald)}
.badge-pink{background:rgba(236,72,153,.15);color:var(--pink)}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue)}
.empty-state{text-align:center;padding:80px 20px;color:var(--text3);grid-column:1/-1}
.empty-state .icon{font-size:64px;display:block;margin-bottom:16px;opacity:.4}
.empty-state .title{font-size:18px;font-weight:700;color:var(--text2);margin-bottom:8px}
.empty-state .desc{font-size:13px}
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:32px;padding:20px 0}
.page-btn{padding:8px 16px;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--glass);color:var(--text2);transition:all var(--transition)}
.page-btn:hover{background:var(--glass2);color:var(--text)}
.page-btn:disabled{opacity:.3;pointer-events:none}
.page-info{font-size:12px;color:var(--text3);padding:0 12px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeIn .4s ease forwards}
@media(max-width:768px){.nav-tabs{display:none}.gallery-grid{grid-template-columns:1fr}.toolbar{flex-direction:column}.search-box{width:100%}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-brand">🎬 <span class="gradient">FitStream</span></a>
  <div class="nav-tabs">
    <a href="index.html" class="nav-tab">Home</a>
    <a href="create.html" class="nav-tab">Create</a>
    <a href="gallery.html" class="nav-tab active">Gallery</a>
    <a href="monitor.html" class="nav-tab">Monitor</a>
  </div>
</nav>
<main>
<div class="container">
<div class="page-header"><h1 class="page-title">🖼️ Gallery</h1><p class="page-sub">Browse, search, and download your generated videos.</p></div>
<div class="toolbar">
  <div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search by prompt or type..." oninput="filterGallery()"></div>
  <div class="filter-chip active" data-filter="all" onclick="setFilter('all')">All <span id="countAll"></span></div>
  <div class="filter-chip" data-filter="animate" onclick="setFilter('animate')">📸 Animate</div>
  <div class="filter-chip" data-filter="story" onclick="setFilter('story')">📖 Story</div>
  <div class="filter-chip" data-filter="tryon" onclick="setFilter('tryon')">👗 Try-On</div>
  <div class="filter-chip" data-filter="compose" onclick="setFilter('compose')">🎨 Compose</div>
</div>
<div class="gallery-grid" id="galleryGrid"><div class="empty-state"><span class="icon">📭</span><div class="title">Loading gallery...</div><div class="desc">Fetching videos from API.</div></div></div>
<div class="pagination" id="pagination"></div>
</div>
</main>
<script>
let all=[],filt='all',pg=0,PS=12;
async function load(){
  try{
    const r=await fetch('/api/v1/gallery?limit=200'),d=await r.json();
    all=(d.items||d||[]).map(i=>({id:i.id||i.job_id,type:i.type||'unknown',prompt:i.prompt||'',video:i.video||i.video_url||`/api/v1/jobs/${i.id||i.job_id}/video`,dur:i.duration_seconds||i.duration||0,res:i.resolution||''}));
    document.getElementById('countAll').textContent='('+all.length+')';filterGallery();
  }catch(e){document.getElementById('galleryGrid').innerHTML='<div class="empty-state"><span class="icon">⚠️</span><div class="title">API Offline</div><div class="desc">Cannot connect.</div></div>'}
}
function setFilter(f){filt=f;pg=0;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));document.querySelector('[data-filter="'+f+'"]').classList.add('active');filterGallery()}
function filterGallery(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  let fd=all;if(filt!=='all')fd=fd.filter(i=>i.type===filt);if(q)fd=fd.filter(i=>(i.prompt||'').toLowerCase().includes(q)||i.type.toLowerCase().includes(q));render(fd)
}
function render(items){
  const g=document.getElementById('galleryGrid');
  if(!items.length){g.innerHTML='<div class="empty-state"><span class="icon">📭</span><div class="title">No videos</div><div class="desc">Generate some first!</div></div>';document.getElementById('pagination').innerHTML='';return}
  const t=items.length,pgs=Math.ceil(t/PS),p=Math.min(pg,pgs-1),sl=items.slice(p*PS,(p+1)*PS);
  g.innerHTML=sl.map((item,i)=>{
    const tb=item.type==='story'?'badge-pink':item.type==='tryon'?'badge-purple':item.type==='compose'?'badge-blue':'badge-emerald';
    const ti=item.type==='story'?'📖':item.type==='tryon'?'👗':item.type==='compose'?'🎨':'📸';
    const d=item.dur?`${item.dur.toFixed(1)}s`:'';
    return `<div class="gallery-card glass animate-in" style="animation-delay:${i*0.05}s" onclick="openVid('${item.video}')">
      <div class="gallery-thumb">${ti}<div class="play-overlay">▶️</div></div>
      <div class="gallery-body"><span class="badge ${tb}">${item.type}</span><div class="gallery-prompt">${item.prompt||'Untitled'}</div>
      <div class="gallery-info">${d?`<span>⏱ ${d}</span>`:''}${item.res?`<span>📐 ${item.res}</span>`:''}<span>🆔 ${item.id}</span></div></div></div>`;
  }).join('');
  document.getElementById('pagination').innerHTML=pgs>1?`<button class="page-btn" onclick="pg=Math.max(0,pg-1);filterGallery()" ${p===0?'disabled':''}>←</button><span class="page-info">${p+1}/${pgs} (${t})</span><button class="page-btn" onclick="pg=Math.min(${pgs-1},pg+1);filterGallery()" ${p>=pgs-1?'disabled':''}>→</button>`:`<span class="page-info">${t} videos</span>`;
}
function openVid(url){window.open(url,'_blank','width=900,height=700')}
load();
</script>
</body>
</html>
